name: init_bqds
description: Validate CatalogManifest initialization with BigQuery Dataset.
setup:
  bigQuery:
    datasets:
      - id: "test-proj:test_dataset"
        datasetReference:
          projectId: test-proj
          datasetId: test_dataset
        location: us

init:
  dataset: test-proj.test_dataset

assert:
  fileSystem:
    catalog.yaml:
      contains: "scope: bq-dataset.test-proj.test_dataset"
